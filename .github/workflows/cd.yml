name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest  
    permissions:
      contents: read
      id-token: write

    steps: 
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build Image
        run: scripts/buildprod.sh  

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/253869999413/locations/global/workloadIdentityPools/notely-pool/providers/notely-provider
          service_account: cloud-run-deployer@celtic-sunlight-443602-k1.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 363.0.0'

      - name: Use gcloud CLI
        run: gcloud info

      - name: Submit Image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/celtic-sunlight-443602-k1/notely-ar-repo/IMAGE:latest .